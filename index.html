<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0e0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Smart Library</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:        #0f0e0c;
      --surface:   #181612;
      --surface2:  #211f1a;
      --border:    #2e2a22;
      --amber:     #c8922a;
      --amber-dim: #7a5718;
      --green:     #4a9e6b;
      --blue:      #4a7fb5;
      --yellow:    #c8b84a;
      --red:       #b54a4a;
      --text:      #e8e0d0;
      --text-dim:  #7a7060;
      --text-mid:  #a89880;
      --nav-h:     56px;
      --header-h:  52px;
      --safe-b:    env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─────────────────────────────────────────────────────── */
    header {
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding-top: env(safe-area-inset-top, 0px);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--amber);
    }

    header h1 span {
      color: var(--text-dim);
      font-weight: 400;
      font-size: 12px;
      margin-left: 8px;
      font-family: 'Inter', sans-serif;
    }

    #status-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 11px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      display: inline-block;
      margin-right: 4px;
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); }

    #esp32-status { display: none; }

    /* ─── Main content area ───────────────────────────────────────────── */
    #app {
      flex: 1;
      overflow: hidden;
      display: flex;
    }

    /* ─── Desktop: side panel + shelf view ───────────────────────────── */
    @media (min-width: 700px) {
      #app { flex-direction: row; }

      #sidebar {
        width: 340px;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }

      #shelf-panel {
        flex: 1;
        overflow-y: auto;
        padding: 24px 28px;
        display: block !important;
      }

      #mobile-nav { display: none !important; }

      #esp32-status { display: inline; }
    }

    /* ─── Mobile: full-screen panels + bottom nav ─────────────────────── */
    @media (max-width: 699px) {
      #app { position: relative; }

      #sidebar {
        position: absolute;
        inset: 0;
        bottom: calc(var(--nav-h) + var(--safe-b));
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #shelf-panel {
        position: absolute;
        inset: 0;
        bottom: calc(var(--nav-h) + var(--safe-b));
        overflow-y: auto;
        padding: 16px;
        display: none;
      }

      #shelf-panel.mobile-active { display: block; }
      #sidebar.mobile-hidden { display: none; }
    }

    /* ─── Bottom nav (mobile only) ────────────────────────────────────── */
    #mobile-nav {
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-shrink: 0;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.15s;
      padding: 6px 0;
    }

    .nav-btn.active { color: var(--amber); }

    .nav-btn svg { width: 22px; height: 22px; }

    /* ─── Sidebar tabs (desktop) ──────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 12px 6px;
      text-align: center;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }

    .tab.active { color: var(--amber); border-bottom-color: var(--amber); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── Inputs ──────────────────────────────────────────────────────── */
    input[type="text"], select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 12px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 16px; /* prevent iOS zoom */
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
      -webkit-appearance: none;
    }

    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: var(--amber-dim);
    }

    textarea { resize: vertical; min-height: 60px; }

    /* ─── Buttons ─────────────────────────────────────────────────────── */
    button {
      background: var(--amber);
      color: #0f0e0c;
      border: none;
      padding: 11px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
      touch-action: manipulation;
    }

    button:active { opacity: 0.7; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.full { width: 100%; }

    /* ─── Search ──────────────────────────────────────────────────────── */
    .search-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .search-wrap input { flex: 1; }
    .search-wrap button { flex-shrink: 0; }

    /* ─── Result cards ────────────────────────────────────────────────── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
      touch-action: manipulation;
    }

    .result-card:active { border-color: var(--amber-dim); opacity: 0.85; }
    @media (hover: hover) { .result-card:hover { border-color: var(--amber-dim); } }

    .result-card .title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 3px;
    }

    .result-card .author { color: var(--text-mid); font-size: 12px; margin-bottom: 8px; }

    .result-card .meta { display: flex; gap: 6px; flex-wrap: wrap; }

    .badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .badge.genre   { background: #2a1f0a; color: var(--amber); }
    .badge.shelf   { background: #0a1f2a; color: var(--blue); }
    .badge.led     { background: #0a2a1a; color: var(--green); }
    .badge.high    { background: #0a2a1a; color: var(--green); }
    .badge.medium  { background: #2a2a0a; color: var(--yellow); }
    .badge.low     { background: #2a0a0a; color: var(--red); }

    .reason { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-style: italic; }

    /* ─── Register form ───────────────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 5px;
    }

    .rfid-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--amber);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 11px 12px;
      border-radius: 8px;
      letter-spacing: 0.1em;
    }

    /* ─── Book list ───────────────────────────────────────────────────── */
    .book-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .book-row:last-child { border-bottom: none; }

    .book-row .led-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--green);
      background: #0a1a10;
      padding: 3px 7px;
      border-radius: 4px;
      min-width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    .book-row .info { flex: 1; min-width: 0; }
    .book-row .info .t { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-row .info .a { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .book-row .actions { display: flex; gap: 5px; flex-shrink: 0; }
    .book-row .actions button { padding: 7px 10px; font-size: 11px; }

    /* ─── Shelf view ──────────────────────────────────────────────────── */
    #shelf-panel h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 4px;
    }

    #shelf-panel .subtitle {
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: 20px;
    }

    .shelf-block { margin-bottom: 28px; }

    .shelf-block h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .shelf-grid { display: grid; gap: 5px; }

    .slot {
      aspect-ratio: 1;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.12s;
      position: relative;
      touch-action: manipulation;
      min-width: 0;
      min-height: 0;
    }

    .slot:active { opacity: 0.7; }
    @media (hover: hover) { .slot:hover { border-color: var(--amber-dim); } }
    .slot.occupied { background: #1a2a1a; border-color: #2a4a2a; }
    .slot.highlighted { border-color: var(--green); box-shadow: 0 0 10px rgba(74,158,107,0.5); }
    .slot.blinking { animation: blink 0.5s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .slot .slot-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: var(--text-dim);
      pointer-events: none;
    }

    .slot.occupied .slot-num { color: var(--green); }

    /* Mobile slot popup (replaces hover tooltip) */
    #slot-popup {
      display: none;
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    #slot-popup.show { display: block; }

    @media (min-width: 700px) {
      #slot-popup {
        bottom: 12px;
      }
    }

    /* ─── Toast ───────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--amber);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 300;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.green { border-left-color: var(--green); }
    #toast.red   { border-left-color: var(--red); }
    #toast.blue  { border-left-color: var(--blue); }

    @media (min-width: 700px) {
      #toast {
        left: auto;
        right: 24px;
        bottom: 24px;
        transform: translateY(10px);
        max-width: 320px;
      }
      #toast.show { transform: translateY(0); }
    }

    /* ─── Modal ───────────────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 400;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    #modal-overlay.show { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px;
      padding-bottom: calc(24px + var(--safe-b));
      width: 100%;
      max-width: 480px;
    }

    @media (min-width: 700px) {
      #modal-overlay { align-items: center; }
      #modal { border-radius: 12px; padding: 28px; max-width: 400px; }
    }

    #modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      margin-bottom: 16px;
      color: var(--amber);
    }

    #modal .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    #modal .modal-actions button { flex: 1; }

    /* ─── Spinner ─────────────────────────────────────────────────────── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ─── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <h1>📚 Smart Library <span>Home Edition</span></h1>
  <div id="status-bar">
    <span><span class="status-dot" id="ws-dot"></span><span id="ws-label">—</span></span>
    <span id="esp32-status"></span>
    <span id="book-count"></span>
  </div>
</header>

<!-- ─── Main ───────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Sidebar (search/register/books) -->
  <div id="sidebar">
    <div class="tabs">
      <div class="tab active" data-tab="search">Search</div>
      <div class="tab" data-tab="register">Register</div>
      <div class="tab" data-tab="books">All Books</div>
    </div>

    <!-- Search -->
    <div class="panel-content tab-panel active" id="tab-search">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Title, author, genre…" autocomplete="off" />
        <button id="search-btn">Find</button>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- Register -->
    <div class="panel-content tab-panel" id="tab-register">
      <div class="form-group">
        <label>RFID UID</label>
        <div class="rfid-display" id="rfid-uid-display">— scan a tag on the ESP32 —</div>
        <input type="hidden" id="reg-rfid" />
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="reg-title" placeholder="Book title" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="reg-author" placeholder="Author name" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" id="reg-genre" placeholder="e.g. Science Fiction" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Shelf (auto-assigns if left blank)</label>
        <select id="reg-shelf">
          <option value="">Auto — least full shelf</option>
        </select>
      </div>
      <button class="full" id="reg-btn" disabled>Register Book</button>
    </div>

    <!-- All Books -->
    <div class="panel-content tab-panel" id="tab-books">
      <div id="books-list"></div>
    </div>
  </div>

  <!-- Shelf map panel -->
  <div id="shelf-panel">
    <h2>Shelf Map</h2>
    <p class="subtitle">Tap any slot to see what's there. Blinking = current search result.</p>
    <div id="shelves-container"></div>
  </div>

</div>

<!-- ─── Mobile bottom nav ──────────────────────────────────────────────────── -->
<nav id="mobile-nav">
  <div class="nav-btn active" data-view="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Search
  </div>
  <div class="nav-btn" data-view="register">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Register
  </div>
  <div class="nav-btn" data-view="books">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
    </svg>
    Books
  </div>
  <div class="nav-btn" data-view="shelf">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="4" rx="1"/><rect x="2" y="10" width="20" height="4" rx="1"/><rect x="2" y="17" width="20" height="4" rx="1"/>
    </svg>
    Map
  </div>
</nav>

<!-- ─── Slot popup (mobile tap) ────────────────────────────────────────────── -->
<div id="slot-popup"></div>

<!-- ─── Toast ──────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ─── Register modal (triggered by ESP32 RFID scan) ─────────────────────── -->
<div id="modal-overlay">
  <div id="modal">
    <h3>New Book Detected</h3>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">
      RFID: <code id="modal-rfid" style="color:var(--amber);font-family:'JetBrains Mono',monospace"></code>
    </p>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="modal-title" placeholder="Book title" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" id="modal-author" placeholder="Author name" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Genre</label>
      <input type="text" id="modal-genre" placeholder="e.g. Mystery" autocomplete="off" />
    </div>
    <div class="modal-actions">
      <button class="secondary" id="modal-cancel">Cancel</button>
      <button id="modal-confirm">Register & Place</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let socket = null;
let shelves = [];
let books   = [];
let highlightedLED = null;
let slotPopupTimer = null;

// ─── Mobile nav ───────────────────────────────────────────────────────────────
const isMobile = () => window.innerWidth < 700;

function setMobileView(view) {
  if (!isMobile()) return;

  const sidebar     = document.getElementById('sidebar');
  const shelfPanel  = document.getElementById('shelf-panel');

  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view)
  );

  if (view === 'shelf') {
    sidebar.classList.add('mobile-hidden');
    shelfPanel.classList.add('mobile-active');
  } else {
    sidebar.classList.remove('mobile-hidden');
    shelfPanel.classList.remove('mobile-active');

    // Also switch the sidebar tab
    const tabMap = { search: 'search', register: 'register', books: 'books' };
    if (tabMap[view]) switchTab(tabMap[view]);
  }
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => setMobileView(btn.dataset.view));
});

// ─── Sidebar tabs ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name)
  );
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === `tab-${name}`)
  );
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  socket = new WebSocket(`${proto}://${location.host}`);

  socket.onopen = () => {
    document.getElementById('ws-dot').classList.add('connected');
    document.getElementById('ws-label').textContent = 'Online';
    loadAll();
  };

  socket.onclose = () => {
    document.getElementById('ws-dot').classList.remove('connected');
    document.getElementById('ws-label').textContent = 'Offline';
    setTimeout(connectWS, 3000);
  };

  socket.onmessage = (e) => {
    try { handleWS(JSON.parse(e.data)); } catch {}
  };
}

function handleWS(msg) {
  switch (msg.cmd) {
    case 'book_found':
      highlightSlot(msg.book.led_index, 'yellow');
      toast(`📖 ${msg.book.title} — ${msg.book.shelf_name} R${msg.book.shelf_row+1}C${msg.book.shelf_col+1}`, 'green');
      if (isMobile()) setMobileView('shelf');
      break;

    case 'register_prompt':
      openModal(msg.rfid_uid);
      break;

    case 'book_moved':
      loadAll();
      highlightSlot(msg.book.led_index, 'green');
      toast(`Moved → LED ${msg.book.led_index}`, 'green');
      break;

    case 'highlight_book':
      highlightSlot(msg.led_index, msg.color || 'green');
      break;
  }
}

// ─── Data ─────────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [s, b, status] = await Promise.all([
      fetch('/api/shelves').then(r => r.json()),
      fetch('/api/books').then(r => r.json()),
      fetch('/api/status').then(r => r.json()),
    ]);

    shelves = s; books = b;

    document.getElementById('book-count').textContent = `${books.length} bk`;
    document.getElementById('esp32-status').textContent =
      `ESP32: ${status.esp32_connected > 0 ? '🟢' : '🔴'}`;

    renderShelves();
    renderBooksList();
    populateShelfSelect();
  } catch {}
}

// ─── Shelf visualizer ─────────────────────────────────────────────────────────
function renderShelves() {
  const container = document.getElementById('shelves-container');
  container.innerHTML = '';

  const booksByLED = {};
  books.forEach(b => { booksByLED[b.led_index] = b; });

  shelves.forEach(shelf => {
    const block = document.createElement('div');
    block.className = 'shelf-block';

    const h3 = document.createElement('h3');
    h3.textContent = `${shelf.name} — ${shelf.rows} × ${shelf.cols}`;
    block.appendChild(h3);

    const grid = document.createElement('div');
    grid.className = 'shelf-grid';
    // Fit grid to container, max ~44px per slot on desktop
    grid.style.gridTemplateColumns = `repeat(${shelf.cols}, minmax(0, 44px))`;

    for (let row = 0; row < shelf.rows; row++) {
      for (let col = 0; col < shelf.cols; col++) {
        const led = shelf.led_start + row * shelf.cols + col;
        const book = booksByLED[led];

        const slot = document.createElement('div');
        slot.className = 'slot' + (book ? ' occupied' : '');
        slot.dataset.led = led;

        const num = document.createElement('div');
        num.className = 'slot-num';
        num.textContent = led;
        slot.appendChild(num);

        if (highlightedLED === led) {
          slot.classList.add('highlighted', 'blinking');
        }

        slot.addEventListener('click', () => onSlotClick(led, row, col, book));
        grid.appendChild(slot);
      }
    }

    block.appendChild(grid);
    container.appendChild(block);
  });
}

function onSlotClick(led, row, col, book) {
  if (book) {
    highlightSlot(led, 'green');
    showSlotPopup(`📖 ${book.title} · ${book.author}`);
  } else {
    showSlotPopup(`Empty slot — LED ${led} (R${row+1} C${col+1})`);
  }
}

function showSlotPopup(text) {
  const popup = document.getElementById('slot-popup');
  popup.textContent = text;
  popup.classList.add('show');
  clearTimeout(slotPopupTimer);
  slotPopupTimer = setTimeout(() => popup.classList.remove('show'), 3000);
}

function highlightSlot(ledIndex, color) {
  document.querySelectorAll('.slot.highlighted').forEach(s =>
    s.classList.remove('highlighted', 'blinking')
  );

  highlightedLED = ledIndex;
  const slot = document.querySelector(`.slot[data-led="${ledIndex}"]`);
  if (slot) {
    slot.classList.add('highlighted', 'blinking');
    slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  setTimeout(() => {
    if (highlightedLED === ledIndex) {
      highlightedLED = null;
      document.querySelectorAll('.slot.highlighted').forEach(s =>
        s.classList.remove('highlighted', 'blinking')
      );
    }
  }, 8000);
}

// ─── Book list ────────────────────────────────────────────────────────────────
function renderBooksList() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = '<p style="color:var(--text-dim);padding:8px 0">No books registered yet.</p>';
    return;
  }

  container.innerHTML = books.map(b => `
    <div class="book-row">
      <div class="led-num">${b.led_index}</div>
      <div class="info">
        <div class="t">${b.title}</div>
        <div class="a">${b.author} · ${b.genre}</div>
      </div>
      <div class="actions">
        <button class="secondary" onclick="locateBook(${b.id},${b.led_index})">📍</button>
        <button class="secondary" onclick="relocateBook(${b.id})">↕</button>
      </div>
    </div>
  `).join('');
}

function locateBook(id, led) {
  highlightSlot(led, 'green');
  const book = books.find(b => b.id === id);
  if (book) toast(`📍 ${book.title} — LED ${led}`, 'green');
  if (isMobile()) setMobileView('shelf');
}

async function relocateBook(id) {
  await fetch(`/api/books/${id}/relocate`, { method: 'POST' });
  toast('Relocation mode — use buttons on ESP32', 'blue');
}

// ─── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
});

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const container = document.getElementById('search-results');
  container.innerHTML = '';

  try {
    const res  = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();

    if (data.error) {
      container.innerHTML = `<p style="color:var(--red)">${data.error}</p>`;
      return;
    }

    const msgEl = document.createElement('p');
    msgEl.style.cssText = 'color:var(--text-dim);font-size:12px;margin-bottom:12px;';
    msgEl.textContent = data.message;
    container.appendChild(msgEl);

    if (!data.matches?.length) return;

    data.matches.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="title">${m.title}</div>
        <div class="author">${m.author}</div>
        <div class="meta">
          <span class="badge genre">${m.genre}</span>
          <span class="badge shelf">${m.shelf_name ?? 'Shelf'} R${m.shelf_row+1}C${m.shelf_col+1}</span>
          <span class="badge led">LED ${m.led_index}</span>
          <span class="badge ${m.confidence}">${m.confidence}</span>
        </div>
        <div class="reason">${m.reason}</div>
      `;
      card.addEventListener('click', () => {
        highlightSlot(m.led_index, 'green');
        if (isMobile()) setMobileView('shelf');
      });
      container.appendChild(card);
      if (i === 0) highlightSlot(m.led_index, 'green');
    });

  } catch (err) {
    container.innerHTML = `<p style="color:var(--red)">Error: ${err.message}</p>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Find';
  }
}

// ─── Register ─────────────────────────────────────────────────────────────────
document.getElementById('reg-btn').addEventListener('click', registerBook);

async function registerBook() {
  const rfid     = document.getElementById('reg-rfid').value.trim();
  const title    = document.getElementById('reg-title').value.trim();
  const author   = document.getElementById('reg-author').value.trim();
  const genre    = document.getElementById('reg-genre').value.trim();
  const shelf_id = document.getElementById('reg-shelf').value || undefined;

  if (!rfid || !title || !author || !genre) { toast('Fill in all fields', 'red'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Registering…';

  try {
    const res  = await fetch('/api/books/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rfid_uid: rfid, title, author, genre, shelf_id }),
    });
    const data = await res.json();

    if (!res.ok) { toast(data.error, 'red'); return; }

    toast(`✅ "${data.book.title}" → LED ${data.book.led_index}`, 'green');
    highlightSlot(data.book.led_index, 'blue');

    document.getElementById('reg-rfid').value = '';
    document.getElementById('rfid-uid-display').textContent = '— scan a tag on the ESP32 —';
    document.getElementById('reg-title').value = '';
    document.getElementById('reg-author').value = '';
    document.getElementById('reg-genre').value = '';
    document.getElementById('reg-btn').disabled = true;

    loadAll();
  } catch (err) {
    toast(err.message, 'red');
  } finally {
    btn.disabled = false; btn.textContent = 'Register Book';
  }
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(rfid_uid) {
  document.getElementById('modal-rfid').textContent = rfid_uid;
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('reg-rfid').value = rfid_uid;
  document.getElementById('rfid-uid-display').textContent = rfid_uid;
  document.getElementById('reg-btn').disabled = false;
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('show');
});

document.getElementById('modal-confirm').addEventListener('click', async () => {
  const rfid_uid = document.getElementById('modal-rfid').textContent;
  const title  = document.getElementById('modal-title').value.trim();
  const author = document.getElementById('modal-author').value.trim();
  const genre  = document.getElementById('modal-genre').value.trim();

  if (!title || !author || !genre) { toast('Fill in all fields', 'red'); return; }

  const btn = document.getElementById('modal-confirm');
  btn.disabled = true; btn.textContent = 'Registering…';

  try {
    const res  = await fetch('/api/books/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rfid_uid, title, author, genre }),
    });
    const data = await res.json();
    if (!res.ok) { toast(data.error, 'red'); return; }

    toast(`✅ "${data.book.title}" → LED ${data.book.led_index}`, 'green');
    highlightSlot(data.book.led_index, 'blue');
    document.getElementById('modal-overlay').classList.remove('show');
    document.getElementById('modal-title').value = '';
    document.getElementById('modal-author').value = '';
    document.getElementById('modal-genre').value = '';
    loadAll();
  } finally {
    btn.disabled = false; btn.textContent = 'Register & Place';
  }
});

// Close modal on overlay tap
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('show');
});

// ─── Shelf select ─────────────────────────────────────────────────────────────
function populateShelfSelect() {
  const sel = document.getElementById('reg-shelf');
  sel.innerHTML = '<option value="">Auto — least full shelf</option>';
  shelves.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
connectWS();
</script>
