<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Library</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:        #0f0e0c;
      --surface:   #181612;
      --surface2:  #211f1a;
      --border:    #2e2a22;
      --amber:     #c8922a;
      --amber-dim: #7a5718;
      --green:     #4a9e6b;
      --blue:      #4a7fb5;
      --yellow:    #c8b84a;
      --red:       #b54a4a;
      --text:      #e8e0d0;
      --text-dim:  #7a7060;
      --text-mid:  #a89880;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Layout ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--amber);
    }

    header h1 span { color: var(--text-dim); font-weight: 400; font-size: 14px; margin-left: 10px; font-family: 'Inter', sans-serif; }

    #status-bar {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      display: inline-block;
      margin-right: 5px;
    }
    .status-dot.connected { background: var(--green); }

    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: calc(100vh - 61px);
    }

    aside {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    section.right {
      padding: 24px 28px;
      overflow-y: auto;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.15s, border-bottom 0.15s;
      border-bottom: 2px solid transparent;
    }

    .tab.active {
      color: var(--amber);
      border-bottom: 2px solid var(--amber);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Search ── */
    .search-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"], select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: var(--amber-dim);
    }

    input[type="text"] { flex: 1; }
    textarea { width: 100%; resize: vertical; min-height: 60px; }
    select { width: 100%; }

    button {
      background: var(--amber);
      color: #0f0e0c;
      border: none;
      padding: 9px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    button.secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.danger {
      background: var(--red);
      color: #fff;
    }

    /* ── Result cards ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .result-card:hover { border-color: var(--amber-dim); }

    .result-card .title {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .result-card .author { color: var(--text-mid); font-size: 12px; margin-bottom: 8px; }

    .result-card .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .badge.genre   { background: #2a1f0a; color: var(--amber); }
    .badge.shelf   { background: #0a1f2a; color: var(--blue); }
    .badge.led     { background: #0a2a1a; color: var(--green); }
    .badge.high    { background: #0a2a1a; color: var(--green); }
    .badge.medium  { background: #2a2a0a; color: var(--yellow); }
    .badge.low     { background: #2a0a0a; color: var(--red); }

    .reason { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-style: italic; }

    /* ── Register form ── */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }

    .rfid-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--amber);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 9px 12px;
      border-radius: 6px;
      letter-spacing: 0.1em;
    }

    /* ── Book list ── */
    .book-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .book-row:last-child { border-bottom: none; }

    .book-row .led-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--green);
      background: #0a1a10;
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 42px;
      text-align: center;
    }

    .book-row .info { flex: 1; }
    .book-row .info .t { font-size: 13px; color: var(--text); }
    .book-row .info .a { font-size: 11px; color: var(--text-dim); }

    .book-row .actions { display: flex; gap: 6px; }
    .book-row .actions button { padding: 5px 10px; font-size: 11px; }

    /* ── Shelf grid (right panel) ── */
    #shelf-view h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 6px;
      color: var(--text);
    }

    #shelf-view .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 24px; }

    .shelf-block { margin-bottom: 32px; }

    .shelf-block h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--amber);
      margin-bottom: 12px;
    }

    .shelf-grid {
      display: grid;
      gap: 6px;
    }

    .slot {
      aspect-ratio: 1;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      position: relative;
      overflow: hidden;
    }

    .slot:hover { border-color: var(--amber-dim); }
    .slot.occupied { background: #1a2a1a; border-color: #2a4a2a; }
    .slot.occupied:hover { border-color: var(--green); }
    .slot.highlighted { border-color: var(--green); box-shadow: 0 0 8px rgba(74, 158, 107, 0.4); }
    .slot.blinking { animation: blink 0.5s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .slot .slot-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
    }

    .slot.occupied .slot-num { color: var(--green); }

    .slot-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 11px;
      white-space: nowrap;
      color: var(--text);
      z-index: 10;
      pointer-events: none;
    }

    .slot:hover .slot-tooltip { display: block; }

    /* ── Notification toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--amber);
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      max-width: 320px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.green { border-left-color: var(--green); }
    #toast.red   { border-left-color: var(--red); }
    #toast.blue  { border-left-color: var(--blue); }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.show { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      width: 400px;
      max-width: 95vw;
    }

    #modal h3 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      margin-bottom: 18px;
      color: var(--amber);
    }

    #modal .actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>📚 Smart Library <span>Home Edition</span></h1>
  <div id="status-bar">
    <span><span class="status-dot" id="ws-dot"></span><span id="ws-label">Disconnected</span></span>
    <span id="esp32-status">ESP32: —</span>
    <span id="book-count">— books</span>
  </div>
</header>

<main>
  <!-- ── Left Panel ── -->
  <aside>
    <div class="tabs">
      <div class="tab active" data-tab="search">Search</div>
      <div class="tab" data-tab="register">Register</div>
      <div class="tab" data-tab="books">All Books</div>
    </div>

    <!-- Search tab -->
    <div class="panel-content tab-panel active" id="tab-search">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Title, author, genre…" />
        <button id="search-btn">Find</button>
      </div>
      <div id="search-results"></div>
    </div>

    <!-- Register tab -->
    <div class="panel-content tab-panel" id="tab-register">
      <div class="form-group">
        <label>RFID UID</label>
        <div class="rfid-display" id="rfid-uid-display">— scan a tag —</div>
        <input type="hidden" id="reg-rfid" />
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="reg-title" placeholder="Book title" />
      </div>
      <div class="form-group">
        <label>Author</label>
        <input type="text" id="reg-author" placeholder="Author name" />
      </div>
      <div class="form-group">
        <label>Genre</label>
        <input type="text" id="reg-genre" placeholder="e.g. Science Fiction" />
      </div>
      <div class="form-group">
        <label>Shelf (optional — auto-assigns if blank)</label>
        <select id="reg-shelf">
          <option value="">Auto (least full shelf)</option>
        </select>
      </div>
      <button id="reg-btn" disabled>Register Book</button>
    </div>

    <!-- All Books tab -->
    <div class="panel-content tab-panel" id="tab-books">
      <div id="books-list"></div>
    </div>
  </aside>

  <!-- ── Right Panel: Shelf Visualizer ── -->
  <section class="right" id="shelf-view">
    <h2>Shelf Map</h2>
    <p class="subtitle">Click any book slot to highlight it. Green = occupied, dim = empty.</p>
    <div id="shelves-container"></div>
  </section>
</main>

<!-- Toast -->
<div id="toast"></div>

<!-- Register Modal (triggered from WebSocket new RFID) -->
<div id="modal-overlay">
  <div id="modal">
    <h3>New Book Detected</h3>
    <p style="color:var(--text-dim); font-size:13px; margin-bottom:16px;">
      RFID scanned: <code id="modal-rfid" style="color:var(--amber); font-family:JetBrains Mono"></code>
    </p>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="modal-title" placeholder="Book title" />
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" id="modal-author" placeholder="Author name" />
    </div>
    <div class="form-group">
      <label>Genre</label>
      <input type="text" id="modal-genre" placeholder="e.g. Mystery" />
    </div>
    <div class="actions">
      <button class="secondary" id="modal-cancel">Cancel</button>
      <button id="modal-confirm">Register & Place</button>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let socket = null;
let shelves = [];
let books = [];
let highlightedLED = null;

// ─── WebSocket ───────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  socket = new WebSocket(`${proto}://${location.host}`);

  socket.onopen = () => {
    document.getElementById('ws-dot').classList.add('connected');
    document.getElementById('ws-label').textContent = 'Connected';
    toast('Server connected', 'green');
    loadAll();
  };

  socket.onclose = () => {
    document.getElementById('ws-dot').classList.remove('connected');
    document.getElementById('ws-label').textContent = 'Disconnected';
    setTimeout(connectWS, 3000);
  };

  socket.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleWS(msg);
  };
}

function handleWS(msg) {
  switch (msg.cmd) {
    case 'handshake':
      break;

    case 'book_found':
      highlightSlot(msg.book.led_index, 'yellow');
      toast(`📖 ${msg.book.title} — ${msg.book.shelf_name} R${msg.book.shelf_row+1} C${msg.book.shelf_col+1}`, 'green');
      break;

    case 'register_prompt':
      openModal(msg.rfid_uid);
      break;

    case 'book_moved':
      loadAll();
      highlightSlot(msg.book.led_index, 'green');
      toast(`Moved: ${msg.book.title} → LED ${msg.book.led_index}`, 'green');
      break;

    case 'highlight_book':
      highlightSlot(msg.led_index, msg.color || 'green');
      break;

    case 'esp32_status':
      document.getElementById('esp32-status').textContent =
        `ESP32: ${msg.connected ? '🟢 Online' : '🔴 Offline'}`;
      break;
  }
}

// ─── Data Loading ─────────────────────────────────────────────────────────────
async function loadAll() {
  const [s, b, status] = await Promise.all([
    fetch('/api/shelves').then(r => r.json()),
    fetch('/api/books').then(r => r.json()),
    fetch('/api/status').then(r => r.json()),
  ]);

  shelves = s;
  books = b;

  document.getElementById('book-count').textContent = `${books.length} books`;
  document.getElementById('esp32-status').textContent =
    `ESP32: ${status.esp32_connected > 0 ? '🟢 Online' : '🔴 Offline'}`;

  renderShelves();
  renderBooksList();
  populateShelfSelect();
}

// ─── Shelf Visualizer ────────────────────────────────────────────────────────
function renderShelves() {
  const container = document.getElementById('shelves-container');
  container.innerHTML = '';

  const booksByLED = {};
  books.forEach(b => { booksByLED[b.led_index] = b; });

  shelves.forEach(shelf => {
    const block = document.createElement('div');
    block.className = 'shelf-block';
    block.innerHTML = `<h3>${shelf.name} — ${shelf.rows} rows × ${shelf.cols} cols</h3>`;

    const grid = document.createElement('div');
    grid.className = 'shelf-grid';
    grid.style.gridTemplateColumns = `repeat(${shelf.cols}, 1fr)`;
    grid.style.maxWidth = `${shelf.cols * 44}px`;

    for (let row = 0; row < shelf.rows; row++) {
      for (let col = 0; col < shelf.cols; col++) {
        const led = shelf.led_start + row * shelf.cols + col;
        const book = booksByLED[led];

        const slot = document.createElement('div');
        slot.className = 'slot' + (book ? ' occupied' : '');
        slot.dataset.led = led;
        slot.dataset.shelfId = shelf.id;
        slot.dataset.row = row;
        slot.dataset.col = col;

        const num = document.createElement('div');
        num.className = 'slot-num';
        num.textContent = led;
        slot.appendChild(num);

        if (book) {
          const tip = document.createElement('div');
          tip.className = 'slot-tooltip';
          tip.textContent = `${book.title} · ${book.author}`;
          slot.appendChild(tip);
        }

        if (highlightedLED === led) {
          slot.classList.add('highlighted', 'blinking');
        }

        slot.addEventListener('click', () => onSlotClick(slot, shelf, row, col, led, book));
        grid.appendChild(slot);
      }
    }

    block.appendChild(grid);
    container.appendChild(block);
  });
}

function highlightSlot(ledIndex, color) {
  // Clear previous
  document.querySelectorAll('.slot.highlighted').forEach(s => {
    s.classList.remove('highlighted', 'blinking');
  });

  highlightedLED = ledIndex;
  const slot = document.querySelector(`.slot[data-led="${ledIndex}"]`);
  if (slot) {
    slot.classList.add('highlighted', 'blinking');
    slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Auto-clear after 8s
  setTimeout(() => {
    if (highlightedLED === ledIndex) {
      highlightedLED = null;
      document.querySelectorAll('.slot.highlighted').forEach(s => {
        s.classList.remove('highlighted', 'blinking');
      });
    }
  }, 8000);
}

function onSlotClick(slotEl, shelf, row, col, led, book) {
  if (book) {
    highlightSlot(led, 'green');
    toast(`📖 ${book.title} — Row ${row+1} Col ${col+1} — LED ${led}`, 'green');
  }
}

// ─── Book List ────────────────────────────────────────────────────────────────
function renderBooksList() {
  const container = document.getElementById('books-list');
  if (!books.length) {
    container.innerHTML = '<p style="color:var(--text-dim);font-size:13px">No books registered yet.</p>';
    return;
  }

  container.innerHTML = books.map(b => `
    <div class="book-row">
      <div class="led-num">${b.led_index}</div>
      <div class="info">
        <div class="t">${b.title}</div>
        <div class="a">${b.author} · ${b.genre}</div>
      </div>
      <div class="actions">
        <button class="secondary" onclick="locateBook(${b.id}, ${b.led_index})">Locate</button>
        <button class="secondary" onclick="relocateBook(${b.id})">Move</button>
      </div>
    </div>
  `).join('');
}

function locateBook(id, led) {
  highlightSlot(led, 'green');
  const book = books.find(b => b.id === id);
  if (book) toast(`📍 ${book.title} — LED ${led}`, 'green');
}

async function relocateBook(id) {
  await fetch(`/api/books/${id}/relocate`, { method: 'POST' });
  toast('Relocation mode started — use buttons on ESP32 to select new slot', 'blue');
}

// ─── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Finding…';

  const container = document.getElementById('search-results');
  container.innerHTML = '';

  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();

    if (data.error) {
      container.innerHTML = `<p style="color:var(--red)">${data.error}</p>`;
      return;
    }

    const msgEl = document.createElement('p');
    msgEl.style.cssText = 'color:var(--text-dim);font-size:12px;margin-bottom:12px;';
    msgEl.textContent = data.message;
    container.appendChild(msgEl);

    if (!data.matches?.length) return;

    data.matches.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="title">${m.title}</div>
        <div class="author">${m.author}</div>
        <div class="meta">
          <span class="badge genre">${m.genre}</span>
          <span class="badge shelf">${m.shelf_name ?? 'Shelf'} R${m.shelf_row+1} C${m.shelf_col+1}</span>
          <span class="badge led">LED ${m.led_index}</span>
          <span class="badge ${m.confidence}">${m.confidence}</span>
        </div>
        <div class="reason">${m.reason}</div>
      `;
      card.addEventListener('click', () => {
        highlightSlot(m.led_index, 'green');
        // Switch to shelf view
        document.querySelector('[data-tab="search"]').click();
      });
      container.appendChild(card);

      // Auto-highlight top match
      if (i === 0) highlightSlot(m.led_index, 'green');
    });

  } catch (err) {
    container.innerHTML = `<p style="color:var(--red)">Error: ${err.message}</p>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Find';
  }
}

// ─── Register ─────────────────────────────────────────────────────────────────
document.getElementById('reg-btn').addEventListener('click', registerBook);

async function registerBook() {
  const rfid = document.getElementById('reg-rfid').value.trim();
  const title = document.getElementById('reg-title').value.trim();
  const author = document.getElementById('reg-author').value.trim();
  const genre = document.getElementById('reg-genre').value.trim();
  const shelf_id = document.getElementById('reg-shelf').value || undefined;

  if (!rfid || !title || !author || !genre) {
    toast('Fill in all fields first', 'red'); return;
  }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = 'Registering…';

  try {
    const res = await fetch('/api/books/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rfid_uid: rfid, title, author, genre, shelf_id }),
    });
    const data = await res.json();

    if (!res.ok) { toast(data.error, 'red'); return; }

    toast(`✅ "${data.book.title}" added → LED ${data.book.led_index}`, 'green');
    highlightSlot(data.book.led_index, 'blue');

    // Reset form
    document.getElementById('reg-rfid').value = '';
    document.getElementById('rfid-uid-display').textContent = '— scan a tag —';
    document.getElementById('reg-title').value = '';
    document.getElementById('reg-author').value = '';
    document.getElementById('reg-genre').value = '';
    document.getElementById('reg-btn').disabled = true;

    loadAll();
  } catch (err) {
    toast(err.message, 'red');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Register Book';
  }
}

// ─── Modal (RFID from ESP32) ─────────────────────────────────────────────────
function openModal(rfid_uid) {
  document.getElementById('modal-rfid').textContent = rfid_uid;
  document.getElementById('modal-overlay').classList.add('show');
  // Also prefill register tab
  document.getElementById('reg-rfid').value = rfid_uid;
  document.getElementById('rfid-uid-display').textContent = rfid_uid;
  document.getElementById('reg-btn').disabled = false;
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('show');
});

document.getElementById('modal-confirm').addEventListener('click', async () => {
  const rfid_uid = document.getElementById('modal-rfid').textContent;
  const title  = document.getElementById('modal-title').value.trim();
  const author = document.getElementById('modal-author').value.trim();
  const genre  = document.getElementById('modal-genre').value.trim();

  if (!title || !author || !genre) { toast('Fill in all fields', 'red'); return; }

  const btn = document.getElementById('modal-confirm');
  btn.disabled = true; btn.textContent = 'Registering…';

  try {
    const res = await fetch('/api/books/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rfid_uid, title, author, genre }),
    });
    const data = await res.json();
    if (!res.ok) { toast(data.error, 'red'); return; }

    toast(`✅ "${data.book.title}" → LED ${data.book.led_index}`, 'green');
    highlightSlot(data.book.led_index, 'blue');
    document.getElementById('modal-overlay').classList.remove('show');
    document.getElementById('modal-title').value = '';
    document.getElementById('modal-author').value = '';
    document.getElementById('modal-genre').value = '';
    loadAll();
  } finally {
    btn.disabled = false; btn.textContent = 'Register & Place';
  }
});

// ─── Shelf Select Populate ────────────────────────────────────────────────────
function populateShelfSelect() {
  const sel = document.getElementById('reg-shelf');
  sel.innerHTML = '<option value="">Auto (least full shelf)</option>';
  shelves.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = s.name;
    sel.appendChild(opt);
  });
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer = null;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
connectWS();
</script>
